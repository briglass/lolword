<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Jurisdiction Finder</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #prominent-feature {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0;
            color: #2c3e50;
            word-wrap: break-word;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>Location Feature Finder</h1>
    <button id="locate-btn">Find Nearby Feature</button>
    
    <div id="prominent-feature"></div>
    
    <label for="raw-data">Discovered Location Data:</label>
    <textarea id="raw-data" readonly></textarea>

    <script>
        const stateMap = {
            'AL': 'Alabama', 'AK': 'Alaska', 'AZ': 'Arizona', 'AR': 'Arkansas', 'CA': 'California',
            'CO': 'Colorado', 'CT': 'Connecticut', 'DE': 'Delaware', 'FL': 'Florida', 'GA': 'Georgia',
            'HI': 'Hawaii', 'ID': 'Idaho', 'IL': 'Illinois', 'IN': 'Indiana', 'IA': 'Iowa',
            'KS': 'Kansas', 'KY': 'Kentucky', 'LA': 'Louisiana', 'ME': 'Maine', 'MD': 'Maryland',
            'MA': 'Massachusetts', 'MI': 'Michigan', 'MN': 'Minnesota', 'MS': 'Mississippi', 'MO': 'Missouri',
            'MT': 'Montana', 'NE': 'Nebraska', 'NV': 'Nevada', 'NH': 'New Hampshire', 'NJ': 'New Jersey',
            'NM': 'New Mexico', 'NY': 'New York', 'NC': 'North Carolina', 'ND': 'North Dakota', 'OH': 'Ohio',
            'OK': 'Oklahoma', 'OR': 'Oregon', 'PA': 'Pennsylvania', 'RI': 'Rhode Island', 'SC': 'South Carolina',
            'SD': 'South Dakota', 'TN': 'Tennessee', 'TX': 'Texas', 'UT': 'Utah', 'VT': 'Vermont',
            'VA': 'Virginia', 'WA': 'Washington', 'WV': 'West Virginia', 'WI': 'Wisconsin', 'WY': 'Wyoming'
        };

        function expandStateAndClean(text) {
            let cleanText = text.trim();
            
            if (cleanText.toUpperCase().startsWith('US-')) {
                cleanText = cleanText.substring(3);
            }
            
            if (stateMap[cleanText.toUpperCase()]) {
                cleanText = stateMap[cleanText.toUpperCase()];
            }
            
            return cleanText.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        }

        document.getElementById('locate-btn').addEventListener('click', () => {
            const featureDiv = document.getElementById('prominent-feature');
            const textBox = document.getElementById('raw-data');
            
            featureDiv.textContent = "Locating...";
            textBox.value = "";

            if (!navigator.geolocation) {
                featureDiv.textContent = "Geolocation is not supported by your browser.";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`);
                        if (!response.ok) throw new Error('Network response error');
                        
                        const data = await response.json();
                        textBox.value = JSON.stringify(data, null, 2);

                        const options = [];
                        if (data.address) {
                            const skipKeys = ['state_code', 'country_code', 'postcode', 'country'];
                            for (const [key, value] of Object.entries(data.address)) {
                                if (!skipKeys.includes(key)) {
                                    options.push(value);
                                }
                            }
                        }
                        
                        if (data.name) options.push(data.name);

                        if (options.length > 0) {
                            const randomFeature = options[Math.floor(Math.random() * options.length)];
                            featureDiv.textContent = expandStateAndClean(randomFeature);
                        } else if (data.display_name) {
                            featureDiv.textContent = expandStateAndClean(data.display_name);
                        } else {
                            featureDiv.textContent = expandStateAndClean(`${lat},${lon}`);
                        }

                    } catch (error) {
                        featureDiv.textContent = "Error retrieving location details.";
                        textBox.value = error.message;
                    }
                },
                (error) => {
                    featureDiv.textContent = `Error: ${error.message}`;
                }
            );
        });
    </script>

</body>
</html>
